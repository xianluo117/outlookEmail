<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook 邮件管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
        }
        
        /* 顶部导航栏 */
        .navbar {
            height: 56px;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .navbar-brand {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .navbar-brand svg {
            width: 24px;
            height: 24px;
        }
        
        .navbar-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        
        .current-account {
            font-size: 14px;
            color: #666;
            background-color: #f5f5f5;
            padding: 6px 16px;
            border-radius: 20px;
            display: none;
        }
        
        .current-account.show {
            display: block;
        }
        
        .current-account strong {
            color: #1a1a1a;
            font-weight: 500;
        }
        
        .navbar-actions {
            display: flex;
            gap: 12px;
        }
        
        .navbar-btn {
            background: none;
            border: 1px solid #e5e5e5;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        
        .navbar-btn:hover {
            background-color: #f5f5f5;
            border-color: #ccc;
        }
        
        /* 主容器 */
        .main-container {
            display: flex;
            margin-top: 56px;
            height: calc(100vh - 56px);
        }
        
        /* 分组面板 */
        .group-panel {
            width: 200px;
            background-color: #fafafa;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .panel-header {
            padding: 0 16px;
            height: 52px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .panel-action-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
        }
        
        .panel-action-btn:hover {
            background-color: #e5e5e5;
        }
        
        .group-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .group-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: background-color 0.15s;
            border-left: 3px solid transparent;
        }
        
        .group-item:hover {
            background-color: #f0f0f0;
        }
        
        .group-item.active {
            background-color: #e8e8e8;
            border-left-color: #1a1a1a;
        }
        
        .group-row-1 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        
        .group-color {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        
        .group-name {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        
        .group-row-2 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 20px;
        }
        
        .group-count {
            font-size: 12px;
            color: #999;
            background-color: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .group-item.active .group-count {
            background-color: #d8d8d8;
        }
        
        .group-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        
        .group-item:hover .group-actions {
            opacity: 1;
        }
        
        .group-action-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 4px;
        }
        
        .group-action-btn:hover {
            background-color: #e0e0e0;
            color: #666;
        }
        
        /* 邮箱账号面板 */
        .account-panel {
            width: 260px;
            background-color: #ffffff;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .account-panel-header {
            padding: 0 16px;
            height: 52px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
        }
        
        .account-panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .account-panel-title .group-color {
            width: 12px;
            height: 12px;
        }
        
        .account-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .account-panel-footer {
            padding: 16px;
            border-top: 1px solid #e5e5e5;
        }
        
        .add-account-btn {
            width: 100%;
            padding: 10px 16px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .add-account-btn:hover {
            background-color: #333;
        }
        
        .account-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: background-color 0.15s;
            border-left: 3px solid transparent;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .account-item:hover {
            background-color: #f5f5f5;
        }
        
        .account-item.active {
            background-color: #f0f0f0;
            border-left-color: #1a1a1a;
        }
        
        .account-item.inactive {
            opacity: 0.6;
        }
        
        .account-item.inactive .account-email {
            text-decoration: line-through;
            color: #999;
        }
        
        .account-email {
            font-size: 13px;
            color: #1a1a1a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 6px;
        }
        
        .account-status-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 8px;
            background-color: #f0f0f0;
            color: #999;
        }
        
        .account-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        
        .account-item:hover .account-actions {
            opacity: 1;
        }
        
        .account-action-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 2px 0;
            font-size: 11px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        
        .account-action-btn:hover {
            color: #1a1a1a;
        }
        
        .account-action-btn.delete:hover {
            color: #dc3545;
        }
        
        /* 内容区域 */
        .content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* 邮件列表面板 */
        .email-list-panel {
            width: 380px;
            background-color: #ffffff;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .email-list-panel.hidden {
            display: none;
        }
        
        .email-list-header {
            padding: 0 20px;
            height: 52px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
        }
        
        .email-list-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .email-count {
            font-size: 13px;
            color: #999;
            font-weight: 400;
            margin-left: 8px;
        }
        
        .refresh-btn {
            background: none;
            border: 1px solid #e5e5e5;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        
        .refresh-btn:hover {
            background-color: #f5f5f5;
            border-color: #ccc;
        }
        
        .email-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .email-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        
        .email-item:hover {
            background-color: #fafafa;
        }
        
        .email-item.active {
            background-color: #f5f5f5;
        }
        
        .email-item.unread .email-subject {
            font-weight: 600;
        }
        
        .email-from {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .email-subject {
            font-size: 14px;
            color: #1a1a1a;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .email-preview {
            font-size: 13px;
            color: #999;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .email-date {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        /* 邮件详情面板 */
        .email-detail-panel {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        .email-detail-toolbar {
            padding: 12px 24px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #fafafa;
        }
        
        .back-btn {
            display: none;
            background: none;
            border: 1px solid #e5e5e5;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        
        .back-btn:hover {
            background-color: #f0f0f0;
        }
        
        .toggle-list-btn {
            background: none;
            border: 1px solid #e5e5e5;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        
        .toggle-list-btn:hover {
            background-color: #f0f0f0;
        }
        
        .email-detail-header {
            padding: 24px 32px;
            border-bottom: 1px solid #e5e5e5;
        }
        
        .email-detail-subject {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
            line-height: 1.3;
        }
        
        .email-detail-meta {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }
        
        .email-detail-meta-row {
            display: flex;
            margin-bottom: 4px;
        }
        
        .email-detail-meta-label {
            color: #999;
            width: 60px;
            flex-shrink: 0;
        }
        
        .email-detail-meta-value {
            color: #1a1a1a;
        }
        
        .email-detail-body {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            background-color: #ffffff;
        }
        
        .email-detail-body iframe {
            width: 100%;
            min-height: 600px;
            border: none;
            background-color: #ffffff;
            display: block;
        }
        
        .email-body-text {
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.7;
            color: #333;
        }
        
        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            padding: 40px;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state-text {
            font-size: 15px;
            text-align: center;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
        }
        
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #e5e5e5;
            border-top-color: #1a1a1a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        .loading-small {
            padding: 20px;
        }
        
        .loading-small .loading-spinner {
            width: 20px;
            height: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background-color: #ffffff;
            border-radius: 12px;
            width: 520px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background-color: #ffffff;
        }
        
        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 4px;
            line-height: 1;
            border-radius: 4px;
            transition: all 0.15s;
        }
        
        .modal-close:hover {
            background-color: #f0f0f0;
            color: #666;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.15s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #1a1a1a;
        }
        
        .form-textarea {
            width: 100%;
            height: 120px;
            padding: 12px 14px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            resize: vertical;
            transition: border-color 0.15s;
        }
        
        .form-textarea:focus {
            outline: none;
            border-color: #1a1a1a;
        }
        
        .form-select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 14px;
            background-color: #ffffff;
            cursor: pointer;
        }
        
        .form-select:focus {
            outline: none;
            border-color: #1a1a1a;
        }
        
        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }
        
        .color-picker-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        
        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }
        
        .color-option:hover {
            transform: scale(1.1);
        }
        
        .color-option.selected {
            border-color: #1a1a1a;
        }
        
        .custom-color-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }
        
        .custom-color-input {
            width: 60px;
            height: 36px;
            padding: 2px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .custom-color-label {
            font-size: 13px;
            color: #666;
        }
        
        .custom-color-hex {
            width: 80px;
            padding: 8px 10px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 13px;
            font-family: monospace;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            position: sticky;
            bottom: 0;
            background-color: #ffffff;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }
        
        .btn-primary {
            background-color: #1a1a1a;
            color: #ffffff;
        }
        
        .btn-primary:hover {
            background-color: #333;
        }
        
        .btn-secondary {
            background-color: #f5f5f5;
            color: #1a1a1a;
            border: 1px solid #e5e5e5;
        }
        
        .btn-secondary:hover {
            background-color: #e5e5e5;
        }
        
        .btn-danger {
            background-color: #dc3545;
            color: #ffffff;
        }
        
        .btn-danger:hover {
            background-color: #c82333;
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            background-color: #1a1a1a;
            color: #ffffff;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .toast.success {
            background-color: #1a1a1a;
        }
        
        .toast.error {
            background-color: #dc3545;
        }
        
        /* 方法标签 */
        .method-tag {
            font-size: 11px;
            padding: 3px 8px;
            background-color: #f5f5f5;
            color: #666;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 500;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .group-panel {
                width: 180px;
            }
            
            .account-panel {
                width: 220px;
            }
            
            .email-list-panel {
                width: 320px;
            }
        }
        
        @media (max-width: 1024px) {
            .group-panel {
                width: 160px;
            }
            
            .account-panel {
                width: 200px;
            }
            
            .email-list-panel {
                width: 280px;
            }
        }
        
        @media (max-width: 768px) {
            .group-panel,
            .account-panel {
                position: fixed;
                left: -280px;
                top: 56px;
                height: calc(100vh - 56px);
                z-index: 50;
                transition: left 0.3s;
            }
            
            .group-panel.show,
            .account-panel.show {
                left: 0;
            }
            
            .email-list-panel {
                width: 100%;
            }
            
            .email-list-panel.hidden {
                display: none;
            }
            
            .back-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            Outlook 邮件
        </div>
        <div class="navbar-center">
            <div class="current-account" id="currentAccount">
                当前邮箱：<strong id="currentAccountEmail"></strong>
            </div>
        </div>
        <div class="navbar-actions">
            <button class="navbar-btn" onclick="showExportModal()">导出邮箱</button>
            <button class="navbar-btn" onclick="showSettingsModal()">⚙️ 设置</button>
            <button class="navbar-btn" onclick="logout()" style="color: #dc3545;">退出登录</button>
        </div>
    </nav>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 分组面板 -->
        <div class="group-panel" id="groupPanel">
            <div class="panel-header">
                <span class="panel-title">分组</span>
                <button class="panel-action-btn" onclick="showAddGroupModal()" title="添加分组">+</button>
            </div>
            <div class="group-list" id="groupList">
                <!-- 分组列表将通过 JS 动态加载 -->
            </div>

    <!-- 消息提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局状态
        let currentAccount = null;
        let currentGroupId = null;
        let currentEmails = [];
        let currentMethod = 'graph';
        let isListVisible = true;
        let groups = [];
        let accountsCache = {}; // 缓存各分组的邮箱列表
        let editingGroupId = null;
        let selectedColor = '#1a1a1a';
        let isTempEmailGroup = false; // 是否是临时邮箱分组
        let tempEmailGroupId = null; // 临时邮箱分组 ID
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadGroups();
            initColorPicker();
        });
        
        // 初始化颜色选择器
        function initColorPicker() {
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedColor = this.dataset.color;
                    // 同步更新自定义颜色输入框
                    document.getElementById('customColorInput').value = selectedColor;
                    document.getElementById('customColorHex').value = selectedColor;
                });
            });
        }
        
        // 选择自定义颜色（颜色选择器）
        function selectCustomColor(color) {
            selectedColor = color;
            document.getElementById('customColorHex').value = color;
            // 取消预设颜色的选中状态
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
        }
        
        // 选择自定义颜色（十六进制输入）
        function selectCustomColorHex(value) {
            // 验证十六进制颜色格式
            const hexPattern = /^#[0-9A-Fa-f]{6}$/;
            if (hexPattern.test(value)) {
                selectedColor = value;
                document.getElementById('customColorInput').value = value;
                // 取消预设颜色的选中状态
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            } else {
                showToast('请输入有效的十六进制颜色（如 #FF5500）', 'error');
            }
        }
        
        // 显示消息提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
        
        // ==================== 分组相关 ====================
        
        // 加载分组列表
        async function loadGroups() {
            const container = document.getElementById('groupList');
            container.innerHTML = '<div class="loading loading-small"><div class="loading-spinner"></div></div>';
            
            try {
                const response = await fetch('/api/groups');
                const data = await response.json();
                
                if (data.success) {
                    groups = data.groups;
                    
                    // 找到临时邮箱分组
                    const tempGroup = groups.find(g => g.name === '临时邮箱');
                    if (tempGroup) {
                        tempEmailGroupId = tempGroup.id;
                    }
                    
                    renderGroupList(data.groups);
                    updateGroupSelects();
                    
                    // 如果之前选中了分组，保持选中状态并刷新邮箱列表
                    if (currentGroupId) {
                        const group = groups.find(g => g.id === currentGroupId);
                        if (group) {
                            // 刷新当前分组的邮箱列表
                            if (currentGroupId === tempEmailGroupId) {
                                loadTempEmails(true);
                            } else {
                                loadAccountsByGroup(currentGroupId, true);
                            }
                        }
                    }
                }
            } catch (error) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-text">加载失败</div></div>';
                showToast('加载分组失败', 'error');
            }
        }
        
        // 渲染分组列表
        function renderGroupList(groups) {
            const container = document.getElementById('groupList');
            
            if (groups.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 40px 20px;">
                        <div class="empty-state-text">暂无分组</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = groups.map(group => {
                const isSystem = group.is_system === 1 || group.name === '临时邮箱';
                const isTempGroup = group.name === '临时邮箱';
                const isDefault = group.id === 1;
                
                return `
                    <div class="group-item ${currentGroupId === group.id ? 'active' : ''} ${isTempGroup ? 'temp-email-group' : ''}"
                         data-group-id="${group.id}"
                         onclick="selectGroup(${group.id})">
                        <div class="group-row-1">
                            <div class="group-color" style="background-color: ${group.color || '#666'}"></div>
                            <span class="group-name">${escapeHtml(group.name)}${isTempGroup ? ' ⚡' : ''}</span>
                        </div>
                        <div class="group-row-2">
                            <span class="group-count">${group.account_count || 0} 个邮箱</span>
                            <div class="group-actions">
                                ${!isSystem ? `<button class="group-action-btn" onclick="event.stopPropagation(); editGroup(${group.id})" title="编辑">✏️</button>` : ''}
                                ${!isDefault && !isSystem ? `<button class="group-action-btn" onclick="event.stopPropagation(); deleteGroup(${group.id})" title="删除">🗑️</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 选择分组
        async function selectGroup(groupId) {
            currentGroupId = groupId;
            
            // 检查是否是临时邮箱分组
            const group = groups.find(g => g.id === groupId);
            isTempEmailGroup = group && group.name === '临时邮箱';
            
            // 更新分组列表 UI
            document.querySelectorAll('.group-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.groupId) === groupId);
            });
            
            // 更新邮箱面板标题
            if (group) {
                document.getElementById('currentGroupName').textContent = group.name;
                document.getElementById('currentGroupColor').style.backgroundColor = group.color || '#666';
                
                // 更新导入邮箱时的默认分组
                const importSelect = document.getElementById('importGroupSelect');
                if (importSelect) {
                    importSelect.value = groupId;
                }
            }
            
            // 更新底部按钮
            updateAccountPanelFooter();
            
            // 加载该分组的邮箱
            if (isTempEmailGroup) {
                await loadTempEmails();
            } else {
                await loadAccountsByGroup(groupId);
            }
        }
        
        // 更新账号面板底部按钮
        function updateAccountPanelFooter() {
            const footer = document.querySelector('.account-panel-footer');
            if (isTempEmailGroup) {
                footer.innerHTML = `
                    <button class="add-account-btn" onclick="generateTempEmail()">+ 生成临时邮箱</button>
                `;
            } else {
                footer.innerHTML = `
                    <button class="add-account-btn" onclick="showAddAccountModal()">+ 导入邮箱</button>
                `;
            }
        }
        
        // 加载分组下的账号
        async function loadAccountsByGroup(groupId, forceRefresh = false) {
            const container = document.getElementById('accountList');
            
            // 如果有缓存且不强制刷新，直接使用缓存
            if (!forceRefresh && accountsCache[groupId]) {
                renderAccountList(accountsCache[groupId]);
                return;
            }
            
            container.innerHTML = '<div class="loading loading-small"><div class="loading-spinner"></div></div>';
            
            try {
                const response = await fetch(`/api/accounts?group_id=${groupId}`);
                const data = await response.json();
                
                if (data.success) {
                    // 缓存数据
                    accountsCache[groupId] = data.accounts;
                    renderAccountList(data.accounts);
                }
            } catch (error) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-text">加载失败</div></div>';
            }
        }
        
        // 渲染邮箱列表
        function renderAccountList(accounts) {
            const container = document.getElementById('accountList');
            
            if (accounts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">该分组暂无邮箱</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = accounts.map(acc => `
                <div class="account-item ${currentAccount === acc.email ? 'active' : ''} ${acc.status === 'inactive' ? 'inactive' : ''}"
                     onclick="selectAccount('${acc.email}')">
                    <div class="account-email" title="${acc.email}">
                        ${acc.email}
                        ${acc.status === 'inactive' ? '<span class="account-status-tag">已停用</span>' : ''}
                    </div>
                    <div class="account-actions">
                        <button class="account-action-btn" onclick="event.stopPropagation(); copyEmail('${acc.email}')" title="复制邮箱">复制</button>
                        <button class="account-action-btn" onclick="event.stopPropagation(); toggleAccountStatus(${acc.id}, '${acc.status || 'active'}')" title="${acc.status === 'inactive' ? '启用' : '停用'}">${acc.status === 'inactive' ? '启用' : '停用'}</button>
                        <button class="account-action-btn" onclick="event.stopPropagation(); showEditAccountModal(${acc.id})" title="编辑">编辑</button>
                        <button class="account-action-btn delete" onclick="event.stopPropagation(); deleteAccount(${acc.id}, '${acc.email}')" title="删除">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 更新分组下拉选择框
        function updateGroupSelects() {
            const selects = ['importGroupSelect', 'editGroupSelect'];
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                if (select) {
                    const currentValue = select.value;
                    select.innerHTML = groups.map(g => 
                        `<option value="${g.id}">${escapeHtml(g.name)}</option>`
                    ).join('');
                    // 恢复之前的选择
                    if (currentValue && groups.find(g => g.id === parseInt(currentValue))) {
                        select.value = currentValue;
                    } else if (currentGroupId) {
                        select.value = currentGroupId;
                    }
                }
            });
        }
        
        // 显示添加分组模态框
        function showAddGroupModal() {
            editingGroupId = null;
            document.getElementById('groupModalTitle').textContent = '添加分组';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDescription').value = '';
            selectedColor = '#1a1a1a';
            document.querySelectorAll('.color-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.color === selectedColor);
            });
            document.getElementById('customColorInput').value = selectedColor;
            document.getElementById('customColorHex').value = selectedColor;
            document.getElementById('addGroupModal').classList.add('show');
        }
        
        // 隐藏添加分组模态框
        function hideAddGroupModal() {
            document.getElementById('addGroupModal').classList.remove('show');
        }
        
        // 编辑分组
        async function editGroup(groupId) {
            try {
                const response = await fetch(`/api/groups/${groupId}`);
                const data = await response.json();
                
                if (data.success) {
                    editingGroupId = groupId;
                    document.getElementById('groupModalTitle').textContent = '编辑分组';
                    document.getElementById('groupName').value = data.group.name;
                    document.getElementById('groupDescription').value = data.group.description || '';
                    selectedColor = data.group.color || '#1a1a1a';
                    
                    // 检查是否是预设颜色
                    let isPresetColor = false;
                    document.querySelectorAll('.color-option').forEach(o => {
                        if (o.dataset.color === selectedColor) {
                            o.classList.add('selected');
                            isPresetColor = true;
                        } else {
                            o.classList.remove('selected');
                        }
                    });
                    
                    // 更新自定义颜色输入框
                    document.getElementById('customColorInput').value = selectedColor;
                    document.getElementById('customColorHex').value = selectedColor;
                    
                    document.getElementById('addGroupModal').classList.add('show');
                }
            } catch (error) {
                showToast('加载分组信息失败', 'error');
            }
        }
        
        // 保存分组
        async function saveGroup() {
            const name = document.getElementById('groupName').value.trim();
            const description = document.getElementById('groupDescription').value.trim();
            
            if (!name) {
                showToast('请输入分组名称', 'error');
                return;
            }

        // 更新账号
        async function updateAccount() {
            const accountId = document.getElementById('editAccountId').value;
            const oldGroupId = currentGroupId;
            const newGroupId = parseInt(document.getElementById('editGroupSelect').value);
            
            const data = {
                email: document.getElementById('editEmail').value.trim(),
                password: document.getElementById('editPassword').value,
                client_id: document.getElementById('editClientId').value.trim(),
                refresh_token: document.getElementById('editRefreshToken').value.trim(),
                group_id: newGroupId,
                remark: document.getElementById('editRemark').value.trim(),
                status: document.getElementById('editStatus').value
            };
            
            if (!data.email || !data.client_id || !data.refresh_token) {
                showToast('邮箱、Client ID 和 Refresh Token 不能为空', 'error');
                return;
            }
            
            try {
                const response = await fetch(`/api/accounts/${accountId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(result.message, 'success');
                    hideEditAccountModal();
                    
                    // 清除相关分组的缓存
                    delete accountsCache[oldGroupId];
                    if (oldGroupId !== newGroupId) {
                        delete accountsCache[newGroupId];
                    }
                    
                    // 刷新分组列表
                    loadGroups();
                    
                    // 刷新当前分组的邮箱列表
                    if (currentGroupId) {
                        loadAccountsByGroup(currentGroupId, true);
                    }
                } else {
                    showToast(result.error, 'error');
                }
            } catch (error) {
                showToast('更新失败', 'error');
            }
        }

            }
            
            try {
                const response = await fetch('/api/accounts/export-selected', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ group_ids: groupIds })
                });
                
                if (response.ok) {
                    // 获取文件名
                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = 'accounts.txt';
                    if (contentDisposition) {
                        const match = contentDisposition.match(/filename\*?=(?:UTF-8'')?([^;\n]+)/i);
                        if (match) {
                            filename = decodeURIComponent(match[1]);
                        }
                    }
                    
                    // 下载文件
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    
                    showToast('导出成功', 'success');
                    hideExportModal();
                } else {
                    const data = await response.json();
                    showToast(data.error || '导出失败', 'error');
                }
            } catch (error) {
                showToast('导出失败', 'error');
            }
        }
        
        // ==================== 邮件相关 ====================
        
        // 加载邮件列表
        async function loadEmails(email) {
            const container = document.getElementById('emailList');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
            
            try {
                const response = await fetch(`/api/emails/${encodeURIComponent(email)}?method=${currentMethod}`);
                const data = await response.json();
                
                if (data.success) {
                    currentEmails = data.emails;
                    currentMethod = data.method === 'Graph API' ? 'graph' : 'imap';
                    
                    // 显示使用的方法和邮件数量
                    const methodTag = document.getElementById('methodTag');
                    methodTag.textContent = data.method;
                    methodTag.style.display = 'inline';
                    
                    document.getElementById('emailCount').textContent = `(${data.emails.length})`;
                    
                    renderEmailList(data.emails);
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">⚠️</div>
                            <div class="empty-state-text">${data.error || '加载失败'}</div>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">网络错误，请重试</div>
                    </div>
                `;
            }
        }
        
        // 渲染邮件列表
        function renderEmailList(emails) {
            const container = document.getElementById('emailList');
            
            if (emails.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">收件箱为空</div>
                    </div>
                `;
                return;
            }
            
            // 根据是否是临时邮箱选择不同的点击处理函数
            const clickHandler = isTempEmailGroup ? 'getTempEmailDetail' : 'selectEmail';
            
            container.innerHTML = emails.map((email, index) => `
                <div class="email-item ${email.is_read === false ? 'unread' : ''}"
                     onclick="${clickHandler}('${email.id}', ${index})">
                    <div class="email-from">${escapeHtml(email.from)}</div>
                    <div class="email-subject">${escapeHtml(email.subject || '无主题')}</div>
                    <div class="email-preview">${escapeHtml(email.body_preview || '')}</div>
                    <div class="email-date">${formatDate(email.date)}</div>
                </div>
            `).join('');
        }
        
        // 选择邮件
        async function selectEmail(messageId, index) {
            // 更新 UI
            document.querySelectorAll('.email-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            
            // 显示工具栏
            document.getElementById('emailDetailToolbar').style.display = 'flex';
            
            // 加载邮件详情
            const container = document.getElementById('emailDetail');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';
            
            try {
                const response = await fetch(`/api/email/${encodeURIComponent(currentAccount)}/${encodeURIComponent(messageId)}?method=${currentMethod}`);
                const data = await response.json();
                
                if (data.success) {
                    renderEmailDetail(data.email);
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">⚠️</div>
                            <div class="empty-state-text">${data.error || '加载失败'}</div>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">网络错误，请重试</div>
                    </div>
                `;
            }
        }
        
        // 渲染邮件详情
        function renderEmailDetail(email) {
            const container = document.getElementById('emailDetail');
            
            const isHtml = email.body_type === 'html' || 
                          (email.body && (email.body.includes('<html') || email.body.includes('<div') || email.body.includes('<p>')));
            
            const bodyContent = isHtml
                ? `<iframe id="emailBodyFrame" onload="adjustIframeHeight(this)"></iframe>`
                : `<div class="email-body-text">${escapeHtml(email.body)}</div>`;
            
            container.innerHTML = `
                <div class="email-detail-header">
                    <div class="email-detail-subject">${escapeHtml(email.subject || '无主题')}</div>
                    <div class="email-detail-meta">
                        <div class="email-detail-meta-row">
                            <span class="email-detail-meta-label">发件人</span>
                            <span class="email-detail-meta-value">${escapeHtml(email.from)}</span>
                        </div>
                        <div class="email-detail-meta-row">
                            <span class="email-detail-meta-label">收件人</span>
                            <span class="email-detail-meta-value">${escapeHtml(email.to || '-')}</span>
                        </div>
                        ${email.cc ? `
                        <div class="email-detail-meta-row">
                            <span class="email-detail-meta-label">抄送</span>
                            <span class="email-detail-meta-value">${escapeHtml(email.cc)}</span>
                        </div>
                        ` : ''}
                        <div class="email-detail-meta-row">
                            <span class="email-detail-meta-label">时间</span>
                            <span class="email-detail-meta-value">${formatDate(email.date)}</span>
                        </div>
                    </div>
                </div>
                <div class="email-detail-body">
                    ${bodyContent}
                </div>
            `;
            
            // 如果是 HTML 内容，设置 iframe 内容
            if (isHtml) {
                const iframe = document.getElementById('emailBodyFrame');
                if (iframe) {
                    const htmlContent = `
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <style>
                                body {
                                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                                    font-size: 15px;
                                    line-height: 1.6;
                                    color: #333;
                                    margin: 0;
                                    padding: 0;
                                    background-color: #ffffff;
                                }
                                img {
                                    max-width: 100%;
                                    height: auto;
                                }
                                a {
                                    color: #0078d4;
                                }
                            </style>
                        </head>
                        <body>${email.body}</body>
                        </html>
                    `;
                    iframe.srcdoc = htmlContent;
                }
            }
        }
        
        // 动态调整 iframe 高度
        function adjustIframeHeight(iframe) {
            try {
                setTimeout(() => {
                    if (iframe.contentDocument && iframe.contentDocument.body) {
                        const height = iframe.contentDocument.body.scrollHeight;
                        iframe.style.height = Math.max(height + 40, 600) + 'px';
                    }
                }, 100);
                
                setTimeout(() => {
                    if (iframe.contentDocument && iframe.contentDocument.body) {
                        const height = iframe.contentDocument.body.scrollHeight;
                        iframe.style.height = Math.max(height + 40, 600) + 'px';
                    }
                }, 500);
            } catch (e) {
                console.log('Cannot adjust iframe height:', e);
            }
        }
        
        // 切换邮件列表显示
        function toggleEmailList() {
            const panel = document.getElementById('emailListPanel');
            const toggleText = document.getElementById('toggleListText');
            
            isListVisible = !isListVisible;
            
            if (isListVisible) {
                panel.classList.remove('hidden');
                toggleText.textContent = '隐藏列表';
            } else {
                panel.classList.add('hidden');
                toggleText.textContent = '显示列表';
            }
        }
        
        // 显示邮件列表（移动端）
        function showEmailList() {
            document.getElementById('emailListPanel').classList.remove('hidden');
            isListVisible = true;
            document.getElementById('toggleListText').textContent = '隐藏列表';
        }
        
        // 刷新邮件
        function refreshEmails() {
            if (currentAccount) {
                if (isTempEmailGroup) {
                    loadTempEmailMessages(currentAccount);
                } else {
                    loadEmails(currentAccount);
                }
            } else {
                showToast('请先选择一个邮箱账号', 'error');
            }
        }
        
        // 复制邮箱地址
        function copyEmail(email) {
            navigator.clipboard.writeText(email).then(() => {
                showToast('邮箱地址已复制', 'success');
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = email;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('邮箱地址已复制', 'success');
            });
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = '/logout';
            }
        }
        
        // ==================== 工具函数 ====================
        
        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                
                const now = new Date();
                const isToday = date.toDateString() === now.toDateString();
                
                if (isToday) {
                    return '今天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                } else {
                    return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' }) + ' ' +
                           date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                }
            } catch (e) {
                return dateStr;
            }
        }
        
        // ==================== 设置相关 ====================
        
        // 显示设置模态框
        async function showSettingsModal() {
            document.getElementById('settingsModal').classList.add('show');
            await loadSettings();
        }
        
        // 隐藏设置模态框
        function hideSettingsModal() {
            document.getElementById('settingsModal').classList.remove('show');
            // 清空密码输入框
            document.getElementById('settingsPassword').value = '';
        }
        
        // 加载设置
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('settingsApiKey').value = data.settings.gptmail_api_key || '';
                    document.getElementById('settingsAuthApiKey').value = '';

                    const authKeyInput = document.getElementById('settingsAuthApiKey');
                    const configured = data.settings.api_auth_key_configured;
                    const masked = data.settings.api_auth_key_masked || '';
                    authKeyInput.placeholder = configured
                        ? `已配置：${masked}；输入新值可覆盖，留空可清除`
                        : '输入系统 API Key，留空表示未启用';

                    // 密码框留空
                    document.getElementById('settingsPassword').value = '';
                }
            } catch (error) {
                showToast('加载设置失败', 'error');
            }
        }
        
        // 保存设置
        async function saveSettings() {
            const password = document.getElementById('settingsPassword').value;
            const apiKey = document.getElementById('settingsApiKey').value.trim();
            const authApiKey = document.getElementById('settingsAuthApiKey').value.trim();
            
            const settings = {};
            
            // 只有输入了密码才更新密码
            if (password) {
                settings.login_password = password;
            }
            
            // GPTMail API Key 可以为空（清除）
            settings.gptmail_api_key = apiKey;
            // 系统 API Key 可以为空（清除）
            settings.api_auth_key = authApiKey;
            
            try {
                const response = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('设置已保存', 'success');
                    hideSettingsModal();
                } else {
                    showToast(data.error || '保存失败', 'error');
                }
            } catch (error) {
                showToast('保存设置失败', 'error');
            }
        }
        
        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hideAddGroupModal();
                hideAddAccountModal();
                hideEditAccountModal();
                hideExportModal();
                hideSettingsModal();
            }
        });
    </script>
</body>
</html>
